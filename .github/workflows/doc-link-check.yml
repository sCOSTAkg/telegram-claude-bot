name: doc-link-check

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  check-doc-links:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Check local markdown links
        run: npm run check:doc-links
